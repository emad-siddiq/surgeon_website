services:
  backend:
    build: ./backend
    environment:
      PORT: 8080
      ALLOWED_ORIGIN: http://localhost:8080,http://localhost:5173
      LOG_LEVEL: info
    ports:
      - "8080:8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 3s
      retries: 3

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "8000:80"
    restart: unless-stopped
